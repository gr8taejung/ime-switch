name: Manual Rust Build

on:
  workflow_dispatch: # 👈 수동 실행을 위한 설정

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2 # 빌드 속도 향상을 위한 캐싱

      - name: Build Release
        run: cargo build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ime-select-exe
          path: target/release/ime-select.exe
